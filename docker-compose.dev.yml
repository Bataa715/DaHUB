services:
  # ─── ClickHouse ──────────────────────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: clickhouse
    ports:
      - "8123:8123"
    environment:
      - CLICKHOUSE_DB=audit_db
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    restart: unless-stopped

  # ─── Backend (NestJS — hot reload) ──────────────────────────────────────────
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile.dev
    container_name: audit-backend-dev
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET environment variable is required}
      - CORS_ORIGINS=${FRONTEND_URL:-http://localhost:9002}
      - CLICKHOUSE_HOST=http://clickhouse:8123
      # Single service user (audit_app): audit_db full access + SELECT on external DBs + ACCESS MANAGEMENT
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-audit_app}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
      - CLICKHOUSE_DATABASE=${CLICKHOUSE_DATABASE:-audit_db}
      # External ClickHouse URL shown to browser users (Tabix / Play UI)
      - CLICKHOUSE_EXTERNAL_HOST=${CLICKHOUSE_EXTERNAL_HOST:-localhost}
      - CLICKHOUSE_EXTERNAL_PORT=${CLICKHOUSE_EXTERNAL_PORT:-8123}
      - CLICKHOUSE_PLAY_URL=${CLICKHOUSE_PLAY_URL:-http://localhost:8123/play}
      # File watching on Windows/Docker
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=1000
    volumes:
      # Mount source — changes reload automatically
      - ./apps/backend/src:/app/src
      - ./apps/backend/scripts:/app/scripts
      - ./apps/backend/nest-cli.json:/app/nest-cli.json
      - ./apps/backend/tsconfig.json:/app/tsconfig.json
      # Keep node_modules inside container (not from Windows host)
      - backend_modules:/app/node_modules
    depends_on:
      - clickhouse
    restart: unless-stopped

  # ─── Frontend (Next.js — hot reload) ────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: audit-frontend-dev
    ports:
      - "9002:9002"
    environment:
      - NODE_ENV=development
      # Browser calls backend — must be reachable from the browser
      - NEXT_PUBLIC_API_URL=${BACKEND_URL:-http://localhost:3001}
      # ClickHouse Play UI link shown to users inside the app
      - NEXT_PUBLIC_CLICKHOUSE_PLAY_URL=${CLICKHOUSE_PLAY_URL:-http://localhost:8123/play}
      # JWT verify in middleware — must match backend JWT_SECRET
      - JWT_SECRET=${JWT_SECRET}
      # File watching on Windows/Docker
      - WATCHPACK_POLLING=true
    volumes:
      # Mount source — changes reload automatically
      - ./apps/nextn/src:/app/apps/nextn/src
      - ./apps/nextn/public:/app/apps/nextn/public
      # Keep node_modules inside container (not from Windows host)
      - frontend_modules:/app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  clickhouse-data:
  backend_modules:
  frontend_modules:
